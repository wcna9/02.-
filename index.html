<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>★ LEGENDARY CHEST ★</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=DotGothic16&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height:100%; overflow:hidden; user-select:none; }
  body {
    background: #0d0221;
    color: #fff;
    font-family: 'Press Start 2P', 'DotGothic16', monospace;
    display:flex; align-items:center; justify-content:center;
    position:relative;
    touch-action: manipulation;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }

  /* pixel starfield */
  .stars { position:absolute; inset:0; pointer-events:none; overflow:hidden; }
  .star {
    position:absolute; width:3px; height:3px; background:#fff;
    animation: twinkle 2s steps(2) infinite;
  }
  .star.gold { background:#ffcc00; }
  @keyframes twinkle { 0%,100%{opacity:1} 50%{opacity:0.2} }

  /* scanlines */
  .scanlines {
    position:fixed; inset:0; pointer-events:none; z-index:100;
    background: repeating-linear-gradient(
      0deg,
      rgba(0,0,0,0.25) 0px,
      rgba(0,0,0,0.25) 2px,
      transparent 2px,
      transparent 4px
    );
    mix-blend-mode: multiply;
  }

  .stage {
    position:relative;
    width:100%; max-width:420px;
    height:100vh;
    display:flex; align-items:center; justify-content:center;
  }
  .stage.shaking { animation: screenShake 0.12s steps(2) infinite; }
  .stage.bigShake { animation: screenShakeBig 0.08s steps(2) 6; }
  @keyframes screenShake {
    0%,100% { transform: translate(0,0); }
    25% { transform: translate(-3px, 2px); }
    75% { transform: translate(3px, -2px); }
  }
  @keyframes screenShakeBig {
    0%,100% { transform: translate(0,0); }
    20% { transform: translate(-10px, 6px); }
    40% { transform: translate(8px, -6px); }
    60% { transform: translate(-8px, -4px); }
    80% { transform: translate(6px, 8px); }
  }

  /* pixel magic circle — smooth summoning */
  .circle {
    position:absolute;
    width: 340px; height: 340px;
    opacity: 0;
    transform: scale(0.25) rotate(-40deg);
    transition: opacity 0.9s ease, transform 0.9s cubic-bezier(.2,.8,.3,1.3);
    pointer-events: none;
  }
  .circle.active {
    opacity: 1;
    transform: scale(1) rotate(0);
    animation: circleBreathe 2.6s ease-in-out infinite 0.9s;
  }
  .circle-outer, .circle-inner {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
  }
  .circle-inner { inset: 9%; width: 82%; height: 82%; }
  .circle.active .circle-outer { animation: rotCW  14s linear infinite; }
  .circle.active .circle-inner { animation: rotCCW  9s linear infinite; }
  @keyframes rotCW  { to { transform: rotate(360deg); } }
  @keyframes rotCCW { to { transform: rotate(-360deg); } }
  @keyframes circleBreathe {
    0%,100% { filter: drop-shadow(0 0 10px rgba(255,204,0,0.5)); }
    50%     { filter: drop-shadow(0 0 26px rgba(255,204,0,1)); }
  }

  /* chest wrapper */
  .chest {
    position:relative;
    width: 260px; height: 220px;
    cursor:pointer;
    z-index: 2;
    animation: float 1s steps(2) infinite;
  }
  @keyframes float {
    0%,100% { transform: translateY(0); }
    50%     { transform: translateY(-6px); }
  }
  .chest.charging { animation: chargeBounce 0.3s steps(3) infinite; }
  @keyframes chargeBounce {
    0%,100% { transform: translate(0,0) scale(1); }
    50%     { transform: translate(0,-4px) scale(1.04); }
  }
  .chest.shaking { animation: pixelShake 0.08s steps(2) infinite !important; }
  @keyframes pixelShake {
    0%   { transform: translate(-6px, 2px) rotate(-2deg); }
    25%  { transform: translate(6px, -2px) rotate(2deg); }
    50%  { transform: translate(-4px, 4px) rotate(-1deg); }
    75%  { transform: translate(4px, -4px) rotate(1deg); }
    100% { transform: translate(-6px, 2px) rotate(-2deg); }
  }
  .chest.hide { opacity: 0; transition: opacity 0.2s steps(2); }

  /* crack light leak (1) */
  .chest .crack {
    position:absolute;
    left: 12%; right: 12%;
    top: 44%;
    height: 3px;
    background: #fff;
    opacity: 0;
    pointer-events:none;
    z-index: 5;
    box-shadow:
      0 0 0 2px #ffcc00,
      0 -6px 18px 2px #ffcc00,
      0  6px 18px 2px #ffcc00,
      0 -12px 36px #fff,
      0  12px 36px #fff;
  }
  .chest.shaking .crack { animation: crackPulse 0.2s steps(2) infinite; }
  @keyframes crackPulse {
    0%,100% { opacity: 0.5; }
    50%     { opacity: 1; }
  }

  /* freeze frame (2) */
  .stage.frozen, .stage.frozen * { animation-play-state: paused !important; }
  .chest.frozen {
    filter: brightness(1.7)
            drop-shadow(0 0 25px #ffcc00)
            drop-shadow(0 0 50px #fff) !important;
  }
  .chest.frozen .crack {
    animation: none !important;
    opacity: 1;
    height: 6px;
    box-shadow:
      0 0 0 3px #ffcc00,
      0 -14px 44px 4px #ffcc00,
      0  14px 44px 4px #ffcc00,
      0 -28px 72px #fff,
      0  28px 72px #fff;
  }

  /* rarity roulette (3) — tense & fast */
  .roulette {
    position:absolute;
    top: 18%; left: 50%;
    transform: translateX(-50%) scale(0);
    opacity: 0;
    z-index: 6;
    transition: transform 0.25s cubic-bezier(.2,.8,.3,1.4), opacity 0.25s;
    pointer-events: none;
    white-space: nowrap;
  }
  .roulette.show { transform: translateX(-50%) scale(1); opacity: 1; }
  .roulette.hide { opacity: 0; transform: translateX(-50%) scale(0.6); }
  .roulette > span {
    display: inline-block;
    font-family: 'Press Start 2P', monospace;
    font-size: 18px;
    letter-spacing: 3px;
    text-shadow: 3px 3px 0 #000;
    will-change: transform, color;
  }
  .roulette > span.common    { color: #aaaaaa; }
  .roulette > span.uncommon  { color: #4ade80; }
  .roulette > span.rare      { color: #60a5fa; }
  .roulette > span.epic      {
    color: #c084fc;
    font-size: 22px;
    text-shadow: 3px 3px 0 #000, 0 0 18px #c084fc, 0 0 32px #c084fc;
  }
  .roulette > span.legendary {
    color: #ffcc00;
    font-size: 28px;
    text-shadow:
      3px 3px 0 #ff3355,
      -2px -2px 0 #ff3355,
      0 0 22px #ffcc00,
      0 0 40px #ffcc00;
    animation: rouletteLand 0.35s steps(3) 0.4s infinite;
  }
  @keyframes rouletteLand {
    0%,100% { transform: scale(1); }
    50%     { transform: scale(1.25); }
  }

  /* vignette (4) */
  .vignette {
    position:fixed; inset:0;
    background: radial-gradient(ellipse at center, transparent 22%, rgba(0,0,0,0.9) 90%);
    opacity: 0;
    pointer-events:none;
    z-index: 15;
    transition: opacity 1.6s ease;
  }
  .vignette.closing { opacity: 1; }
  .vignette.open    { opacity: 0; transition: opacity 0.8s ease; }

  .chest svg { position:absolute; left:0; top:0; width:100%; height:100%; overflow:visible; }
  .lid-svg { transform-origin: 50% 56%; transition: transform 0.5s cubic-bezier(.5,-0.5,.3,1.5); }
  .chest.open .lid-svg { transform: translateY(-20px) rotate(-12deg); }

  /* exclamation mark pop */
  .exclaim {
    position:absolute; top:-40px; left:50%;
    transform: translateX(-50%) scale(0);
    font-size: 36px;
    color: #ff3355;
    text-shadow: 4px 4px 0 #000, -2px -2px 0 #000;
    font-family: 'Press Start 2P', monospace;
    z-index: 5;
  }
  .exclaim.show { animation: exclaimPop 0.6s steps(3) forwards; }
  @keyframes exclaimPop {
    0%   { transform: translateX(-50%) scale(0) translateY(20px); }
    40%  { transform: translateX(-50%) scale(1.4) translateY(-10px); }
    60%  { transform: translateX(-50%) scale(1) translateY(0); }
    100% { transform: translateX(-50%) scale(1) translateY(0); }
  }
  .exclaim.hide { opacity: 0; }

  /* flash overlay */
  .flash {
    position:fixed; inset:0;
    background: #fff;
    opacity: 0;
    pointer-events:none;
    z-index: 50;
  }
  .flash.fire { animation: flashBoom 0.5s steps(4) forwards; }
  @keyframes flashBoom {
    0%   { opacity: 0; }
    20%  { opacity: 1; }
    60%  { opacity: 0.7; background: #ffcc00; }
    100% { opacity: 0; }
  }

  /* burst rings */
  .ring {
    position:absolute; top:50%; left:50%;
    width: 20px; height: 20px;
    border: 6px solid #ffcc00;
    border-radius: 0;
    transform: translate(-50%,-50%) scale(0);
    opacity: 0;
    pointer-events:none;
    box-shadow: 0 0 0 2px #000;
  }
  .ring.fire  { animation: ringOut 1s steps(8) forwards; }
  .ring.r2    { animation-delay: 0.1s; border-color:#fff; }
  .ring.r3    { animation-delay: 0.2s; border-color:#ff3355; }
  @keyframes ringOut {
    0%   { transform: translate(-50%,-50%) scale(0);  opacity: 1; }
    100% { transform: translate(-50%,-50%) scale(40); opacity: 0; }
  }

  /* result */
  .result {
    position:absolute;
    top:50%; left:50%;
    transform: translate(-50%,-50%);
    opacity:0;
    pointer-events:none;
    text-align:center;
    z-index: 5;
    width: 90%;
  }
  .result.show { opacity: 1; pointer-events:auto; }

  .rank-wrap {
    position:relative;
    margin-bottom: 20px;
    transform: scale(0);
  }
  .result.show .rank-wrap { animation: stamp 0.6s steps(4) forwards; }
  @keyframes stamp {
    0%   { transform: scale(0) rotate(-20deg); }
    60%  { transform: scale(1.4) rotate(4deg); }
    80%  { transform: scale(0.9) rotate(-2deg); }
    100% { transform: scale(1) rotate(0); }
  }

  .rank-label {
    font-size: 10px;
    letter-spacing: 4px;
    color: #fff;
    margin-bottom: 10px;
    text-shadow: 2px 2px 0 #ff3355;
  }
  .rank-name {
    font-size: 34px;
    color: #ffcc00;
    text-shadow:
      3px 3px 0 #ff3355,
      -2px -2px 0 #ff3355,
      0 0 20px #ffcc00;
    letter-spacing: 6px;
    animation: rankGlow 0.5s steps(2) infinite;
  }
  @keyframes rankGlow {
    0%,100% { color: #ffcc00; text-shadow: 3px 3px 0 #ff3355, -2px -2px 0 #ff3355, 0 0 20px #ffcc00; }
    50%     { color: #ffffff; text-shadow: 3px 3px 0 #ff3355, -2px -2px 0 #ff3355, 0 0 30px #fff; }
  }

  .qr-card {
    display: inline-block;
    background: #fff;
    padding: 14px;
    border: 6px solid #ffcc00;
    box-shadow:
      0 0 0 3px #000,
      0 0 0 9px #ffcc00,
      0 0 0 12px #000,
      0 0 40px rgba(255,204,0,0.8);
    transform: translateY(30px);
    opacity: 0;
  }
  .result.show .qr-card { animation: cardIn 0.4s steps(3) 0.5s forwards; }
  @keyframes cardIn {
    0%   { transform: translateY(30px) scale(0.8); opacity: 0; }
    60%  { transform: translateY(-6px) scale(1.05); opacity: 1; }
    100% { transform: translateY(0) scale(1); opacity: 1; }
  }
  .qr-card img {
    display: block;
    width: 230px; height: 230px;
    max-width: 62vw; max-height: 62vw;
    image-rendering: pixelated;
  }

  /* hint */
  .hint {
    position:absolute;
    bottom: 70px; left:50%;
    transform: translateX(-50%);
    color: #ffcc00;
    font-size: 11px;
    letter-spacing: 2px;
    text-shadow: 2px 2px 0 #000;
    white-space: nowrap;
    animation: blink 0.7s steps(2) infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .hint.hide { display: none; }

  /* pixel particles */
  .particle {
    position:fixed;
    width: 8px; height: 8px;
    background: #ffcc00;
    pointer-events:none;
    z-index: 30;
    box-shadow: 0 0 0 2px #000;
  }
  .particle.white { background: #fff; }
  .particle.red { background: #ff3355; }

  /* arrow hint */
  .arrow {
    display:inline-block;
    animation: arrowMove 0.5s steps(2) infinite;
  }
  @keyframes arrowMove { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }
</style>
</head>
<body>
  <div class="stars" id="stars"></div>

  <div class="stage" id="stage">
    <div class="circle" id="circle">
      <svg class="circle-outer" viewBox="0 0 100 100" shape-rendering="crispEdges">
        <g fill="none" stroke="#ffcc00" stroke-width="0.8">
          <circle cx="50" cy="50" r="47"/>
          <circle cx="50" cy="50" r="43" stroke-dasharray="1,2"/>
          <rect x="10" y="10" width="80" height="80"/>
        </g>
        <g fill="#ffcc00">
          <rect x="49" y="2"  width="2" height="5"/>
          <rect x="49" y="93" width="2" height="5"/>
          <rect x="2"  y="49" width="5" height="2"/>
          <rect x="93" y="49" width="5" height="2"/>
          <rect x="16" y="16" width="3" height="3"/>
          <rect x="81" y="16" width="3" height="3"/>
          <rect x="16" y="81" width="3" height="3"/>
          <rect x="81" y="81" width="3" height="3"/>
        </g>
      </svg>
      <svg class="circle-inner" viewBox="0 0 100 100" shape-rendering="crispEdges">
        <g fill="none" stroke="#ffcc00" stroke-width="0.8">
          <polygon points="50,14 84,74 16,74"/>
          <polygon points="50,86 16,26 84,26"/>
          <circle cx="50" cy="50" r="28" stroke-dasharray="2,2"/>
        </g>
        <g fill="#ffcc00">
          <rect x="49" y="22" width="2" height="2"/>
          <rect x="49" y="76" width="2" height="2"/>
          <rect x="22" y="49" width="2" height="2"/>
          <rect x="76" y="49" width="2" height="2"/>
        </g>
      </svg>
    </div>

    <div class="ring" id="ring1"></div>
    <div class="ring r2" id="ring2"></div>
    <div class="ring r3" id="ring3"></div>

    <div class="chest" id="chest">
      <div class="exclaim" id="exclaim">!</div>

      <!-- BODY -->
      <svg viewBox="0 0 20 16" shape-rendering="crispEdges" preserveAspectRatio="xMidYMid meet">
        <!-- shadow -->
        <rect x="2" y="15" width="16" height="1" fill="#000" opacity="0.5"/>
        <!-- body base -->
        <rect x="1" y="7"  width="18" height="9" fill="#5a2808"/>
        <rect x="2" y="8"  width="16" height="7" fill="#8b4513"/>
        <!-- gold top trim -->
        <rect x="1" y="7"  width="18" height="1" fill="#ffcc00"/>
        <rect x="1" y="8"  width="18" height="1" fill="#d4a017"/>
        <!-- gold bottom trim -->
        <rect x="1" y="14" width="18" height="1" fill="#d4a017"/>
        <rect x="1" y="15" width="18" height="1" fill="#ffcc00"/>
        <!-- side gold -->
        <rect x="1" y="7"  width="1"  height="9" fill="#ffcc00"/>
        <rect x="18" y="7" width="1"  height="9" fill="#ffcc00"/>
        <!-- lock (bottom half) -->
        <rect x="9"  y="9"  width="2" height="4" fill="#000"/>
        <rect x="9"  y="10" width="2" height="2" fill="#ffcc00"/>
        <!-- wood planks -->
        <rect x="5"  y="9"  width="1" height="5" fill="#5a2808"/>
        <rect x="14" y="9"  width="1" height="5" fill="#5a2808"/>
      </svg>

      <!-- LID -->
      <svg class="lid-svg" viewBox="0 0 20 16" shape-rendering="crispEdges" preserveAspectRatio="xMidYMid meet">
        <rect x="1" y="1" width="18" height="7" fill="#5a2808"/>
        <rect x="2" y="2" width="16" height="5" fill="#8b4513"/>
        <!-- gold top -->
        <rect x="2" y="1" width="16" height="1" fill="#ffcc00"/>
        <rect x="3" y="0" width="14" height="1" fill="#ffcc00"/>
        <!-- gold bottom of lid -->
        <rect x="1" y="7" width="18" height="1" fill="#ffcc00"/>
        <rect x="1" y="6" width="18" height="1" fill="#d4a017"/>
        <!-- side gold -->
        <rect x="1" y="1" width="1" height="7" fill="#ffcc00"/>
        <rect x="18" y="1" width="1" height="7" fill="#ffcc00"/>
        <!-- lock top -->
        <rect x="9"  y="5" width="2" height="3" fill="#000"/>
        <rect x="9"  y="6" width="2" height="1" fill="#ffcc00"/>
        <!-- highlight -->
        <rect x="4"  y="3" width="2" height="1" fill="#d4a017"/>
      </svg>

      <div class="crack"></div>
    </div>

    <div class="roulette" id="roulette"><span id="rouletteText">COMMON</span></div>

    <div class="result" id="result">
      <div class="rank-wrap">
        <div class="rank-label">★ LEGENDARY ★</div>
        <div class="rank-name">전 설</div>
      </div>
      <div class="qr-card">
        <img src="내부 만족도.jpeg" alt="QR Code">
      </div>
    </div>

    <div class="hint" id="hint"><span class="arrow">▼</span> TAP TO OPEN <span class="arrow">▼</span></div>
  </div>

  <div class="vignette" id="vignette"></div>
  <div class="flash" id="flash"></div>
  <div class="scanlines"></div>

<script>
  // starfield
  const stars = document.getElementById('stars');
  for (let i = 0; i < 80; i++) {
    const s = document.createElement('div');
    s.className = 'star' + (Math.random() < 0.3 ? ' gold' : '');
    s.style.left = Math.random() * 100 + '%';
    s.style.top  = Math.random() * 100 + '%';
    s.style.animationDelay = Math.random() * 2 + 's';
    stars.appendChild(s);
  }

  const stage    = document.getElementById('stage');
  const chest    = document.getElementById('chest');
  const circle   = document.getElementById('circle');
  const exclaim  = document.getElementById('exclaim');
  const flash    = document.getElementById('flash');
  const result   = document.getElementById('result');
  const hint     = document.getElementById('hint');
  const roulette     = document.getElementById('roulette');
  const rouletteText = document.getElementById('rouletteText');
  const vignette     = document.getElementById('vignette');
  const rings    = [document.getElementById('ring1'), document.getElementById('ring2'), document.getElementById('ring3')];

  const RANKS = [
    { name: 'COMMON',   cls: 'common'   },
    { name: 'UNCOMMON', cls: 'uncommon' },
    { name: 'RARE',     cls: 'rare'     },
    { name: 'EPIC',     cls: 'epic'     }
  ];
  let rouletteTimer = null;
  let opened = false;

  function startRoulette(onLand) {
    roulette.classList.add('show');
    let i = 0;
    let fakeAnim = null;
    const startTime = performance.now();
    const fastEnd  = 600;

    function jitter() {
      const jx = (Math.random() - 0.5) * 12;
      const jy = (Math.random() - 0.5) *  6;
      const js = 0.9 + Math.random() * 0.25;
      rouletteText.style.transform = `translate(${jx}px, ${jy}px) scale(${js})`;
    }

    // phase A: fast random spin
    function fastTick() {
      const elapsed = performance.now() - startTime;
      if (elapsed >= fastEnd) { slowUncommon(); return; }
      const t = elapsed / fastEnd;
      const delay = 22 + t * 55;
      const r = RANKS[i % RANKS.length];
      rouletteText.className = r.cls;
      rouletteText.textContent = r.name;
      jitter();
      i++;
      rouletteTimer = setTimeout(fastTick, delay);
    }

    // phase B: deterministic slowdown climbing the ranks
    function slowUncommon() {
      rouletteText.className = 'uncommon';
      rouletteText.textContent = 'UNCOMMON';
      jitter();
      rouletteTimer = setTimeout(slowRare, 170);
    }
    function slowRare() {
      rouletteText.className = 'rare';
      rouletteText.textContent = 'RARE';
      jitter();
      rouletteTimer = setTimeout(fakeStop, 230);
    }

    // phase C: FAKE STOP on EPIC — feels like this is the answer
    function fakeStop() {
      rouletteText.className = 'epic';
      rouletteText.textContent = 'EPIC';
      rouletteText.style.transform = '';
      fakeAnim = rouletteText.animate([
        { transform: 'scale(0.7)' },
        { transform: 'scale(1.18)' }
      ], { duration: 220, easing: 'cubic-bezier(.2,.8,.3,1.2)', fill: 'forwards' });
      if (navigator.vibrate) navigator.vibrate(90);
      rouletteTimer = setTimeout(clickUp, 550);
    }

    // phase D: one more click! → LEGENDARY pop
    function clickUp() {
      if (fakeAnim) fakeAnim.cancel();
      rouletteText.className = 'legendary';
      rouletteText.textContent = 'LEGENDARY';
      rouletteText.style.transform = '';
      rouletteText.animate([
        { transform: 'scale(0.3)' },
        { transform: 'scale(1.7)', offset: 0.5 },
        { transform: 'scale(1)'   }
      ], { duration: 400, easing: 'cubic-bezier(.2,.8,.3,1)' });
      spawnSparks(16);
      if (navigator.vibrate) navigator.vibrate([40, 40, 160]);
      if (onLand) onLand();
    }

    fastTick();
  }

  chest.addEventListener('click', () => {
    if (opened) return;
    opened = true;
    hint.classList.add('hide');
    chest.style.animation = 'none';

    // phase 1 (0ms): charge + exclaim + vignette begins closing
    chest.classList.add('charging');
    exclaim.classList.add('show');
    vignette.classList.add('closing');
    if (navigator.vibrate) navigator.vibrate([30, 20, 30, 20, 30]);

    // phase 2 (600ms): shake + magic circle + roulette start
    setTimeout(() => {
      chest.classList.remove('charging');
      chest.classList.add('shaking');
      stage.classList.add('shaking');
      circle.classList.add('active');
      startRoulette();
      spawnSparks(10);
      if (navigator.vibrate) navigator.vibrate([60, 40, 60, 40, 80, 40, 120]);
    }, 600);

    // phase 3: escalating sparks (tracking the roulette drama)
    setTimeout(() => spawnSparks(15), 1100);
    setTimeout(() => spawnSparks(18), 1500);
    setTimeout(() => spawnSparks(22), 1900);

    // phase 5 (2450ms): FREEZE FRAME — just after LEGENDARY lands (~2150ms)
    setTimeout(() => {
      chest.classList.remove('shaking');
      stage.classList.remove('shaking');
      stage.classList.add('frozen');
      chest.classList.add('frozen');
    }, 2450);

    // phase 6 (2750ms): BOOM — unfreeze + flash + open
    setTimeout(() => {
      stage.classList.remove('frozen');
      chest.classList.remove('frozen');
      stage.classList.add('bigShake');
      exclaim.classList.add('hide');
      roulette.classList.remove('show');
      roulette.classList.add('hide');
      flash.classList.add('fire');
      chest.classList.add('open');
      rings.forEach(r => r.classList.add('fire'));
      spawnParticles(70);
      if (navigator.vibrate) navigator.vibrate(500);
    }, 2750);

    // phase 7 (3250ms): reveal + vignette opens
    setTimeout(() => {
      chest.classList.add('hide');
      result.classList.add('show');
      stage.classList.remove('bigShake');
      vignette.classList.remove('closing');
      vignette.classList.add('open');
    }, 3250);
  });

  function spawnSparks(n) {
    const rect = chest.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top  + rect.height / 2;
    for (let i = 0; i < n; i++) {
      const p = document.createElement('div');
      const roll = Math.random();
      p.className = 'particle' + (roll < 0.3 ? ' white' : roll < 0.5 ? ' red' : '');
      p.style.left = cx + 'px';
      p.style.top  = cy + 'px';
      document.body.appendChild(p);
      const angle = Math.random() * Math.PI * 2;
      const dist  = 60 + Math.random() * 80;
      const dx = Math.cos(angle) * dist;
      const dy = Math.sin(angle) * dist - 30;
      p.animate([
        { transform: 'translate(0,0)', opacity: 1 },
        { transform: `translate(${dx}px, ${dy}px)`, opacity: 0 }
      ], { duration: 700, easing: 'steps(6)' });
      setTimeout(() => p.remove(), 700);
    }
  }

  function spawnParticles(n) {
    const rect = chest.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top  + rect.height / 2;
    for (let i = 0; i < n; i++) {
      const p = document.createElement('div');
      const roll = Math.random();
      p.className = 'particle' + (roll < 0.3 ? ' white' : roll < 0.5 ? ' red' : '');
      const size = 6 + Math.floor(Math.random() * 6);
      p.style.width  = size + 'px';
      p.style.height = size + 'px';
      p.style.left = cx + 'px';
      p.style.top  = cy + 'px';
      document.body.appendChild(p);
      const angle = Math.random() * Math.PI * 2;
      const dist  = 150 + Math.random() * 300;
      const dx = Math.cos(angle) * dist;
      const dy = Math.sin(angle) * dist - 120;
      p.animate([
        { transform: 'translate(0,0) rotate(0deg)', opacity: 1 },
        { transform: `translate(${dx}px, ${dy}px) rotate(${Math.random()*360}deg)`, opacity: 0 }
      ], { duration: 1400, easing: 'steps(10)' });
      setTimeout(() => p.remove(), 1400);
    }
  }
</script>
