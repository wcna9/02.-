<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>☆ 선물상자 ☆</title>
<link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height:100%; overflow:hidden; user-select:none; }
  body {
    background: linear-gradient(180deg, #A8DCF0 0%, #C8E8F5 30%, #DFEFF7 52%, #B5DE82 76%, #98C96E 100%);
    color: #4A3424;
    font-family: 'DotGothic16', 'Press Start 2P', monospace;
    display:flex; align-items:center; justify-content:center;
    position:relative;
    touch-action: manipulation;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }

  /* clouds */
  .clouds { position:absolute; inset:0; pointer-events:none; overflow:hidden; }
  .cloud {
    position:absolute;
    left: -140px;
    opacity: 0.92;
    animation: drift 45s linear infinite;
  }
  @keyframes drift {
    from { transform: translateX(0); }
    to   { transform: translateX(calc(100vw + 280px)); }
  }

  /* grass strip */
  .grass {
    position: absolute;
    bottom: 0; left: 0; right: 0; height: 26px;
    background:
      repeating-linear-gradient(90deg, #7FB650 0 8px, #98C96E 8px 16px);
    box-shadow: 0 -2px 0 #6A9D40, inset 0 2px 0 rgba(255,255,255,0.25);
    z-index: 1;
  }

  /* villagers on the grass */
  .villagers {
    position: absolute;
    left: 0; right: 0; bottom: 18px;
    height: 72px;
    pointer-events: none;
    z-index: 1;
  }
  .villager {
    position: absolute;
    bottom: 0;
    width: 56px; height: 72px;
    image-rendering: pixelated;
    filter: drop-shadow(0 2px 0 rgba(74,52,36,0.25));
  }
  .villager svg { width: 100%; height: 100%; display: block; }
  .v-nook     { left: 8%;  animation: idleHop 1.8s steps(2) infinite; }
  .v-isabelle { right: 10%; animation: idleHop 1.6s steps(2) infinite 0.2s; }
  .v-player   { left: 50%; transform: translateX(-50%);
                animation: idleHopCenter 2.0s steps(2) infinite 0.4s; }
  @keyframes idleHop {
    0%,100% { transform: translateY(0); }
    50%     { transform: translateY(-3px); }
  }
  @keyframes idleHopCenter {
    0%,100% { transform: translate(-50%, 0); }
    50%     { transform: translate(-50%, -3px); }
  }
  /* isabelle waving arm */
  .wave-arm {
    transform-origin: 10px 11px;
    animation: waveArm 1.4s ease-in-out infinite;
  }
  @keyframes waveArm {
    0%,100% { transform: rotate(-10deg); }
    50%     { transform: rotate(18deg); }
  }

  .stage {
    position:relative;
    width:100%; max-width:420px;
    height:100vh;
    height:100dvh;
    display:flex; align-items:center; justify-content:center;
    z-index: 2;
  }
  .stage.shaking  { animation: screenShake 0.12s steps(2) infinite; }
  .stage.bigShake { animation: screenShakeBig 0.08s steps(2) 6; }
  @keyframes screenShake {
    0%,100% { transform: translate(0,0); }
    25% { transform: translate(-3px, 2px); }
    75% { transform: translate(3px, -2px); }
  }
  @keyframes screenShakeBig {
    0%,100% { transform: translate(0,0); }
    20% { transform: translate(-10px, 6px); }
    40% { transform: translate(8px, -6px); }
    60% { transform: translate(-8px, -4px); }
    80% { transform: translate(6px, 8px); }
  }

  /* sparkle ring */
  .circle {
    position:absolute;
    width: 340px; height: 340px;
    opacity: 0;
    transform: scale(0.25) rotate(-40deg);
    transition: opacity 0.9s ease, transform 0.9s cubic-bezier(.2,.8,.3,1.3);
    pointer-events: none;
  }
  .circle.active {
    opacity: 1;
    transform: scale(1) rotate(0);
    animation: circleBreathe 2.6s ease-in-out infinite 0.9s;
  }
  .circle-outer, .circle-inner {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
  }
  .circle-inner { inset: 9%; width: 82%; height: 82%; }
  .circle.active .circle-outer { animation: rotCW  14s linear infinite; }
  .circle.active .circle-inner { animation: rotCCW  9s linear infinite; }
  @keyframes rotCW  { to { transform: rotate(360deg); } }
  @keyframes rotCCW { to { transform: rotate(-360deg); } }
  @keyframes circleBreathe {
    0%,100% { filter: drop-shadow(0 0 10px rgba(255,232,128,0.6)); }
    50%     { filter: drop-shadow(0 0 26px rgba(255,232,128,1)); }
  }

  /* gift box */
  .chest {
    position:relative;
    width: 260px; height: 220px;
    cursor:pointer;
    z-index: 2;
    filter: drop-shadow(4px 6px 0 rgba(74,52,36,0.25));
    animation: float 1.6s ease-in-out infinite;
  }
  @keyframes float {
    0%,100% { transform: translateY(0); }
    50%     { transform: translateY(-8px); }
  }
  .chest.charging { animation: chargeBounce 0.3s steps(3) infinite; }
  @keyframes chargeBounce {
    0%,100% { transform: translate(0,0) scale(1); }
    50%     { transform: translate(0,-4px) scale(1.04); }
  }
  .chest.shaking { animation: pixelShake 0.08s steps(2) infinite !important; }
  @keyframes pixelShake {
    0%   { transform: translate(-6px, 2px) rotate(-2deg); }
    25%  { transform: translate(6px, -2px) rotate(2deg); }
    50%  { transform: translate(-4px, 4px) rotate(-1deg); }
    75%  { transform: translate(4px, -4px) rotate(1deg); }
    100% { transform: translate(-6px, 2px) rotate(-2deg); }
  }
  .chest.hide { opacity: 0; transition: opacity 0.2s steps(2); }

  /* crack light leak */
  .chest .crack {
    position:absolute;
    left: 12%; right: 12%;
    top: 44%;
    height: 3px;
    background: #FFF8E7;
    opacity: 0;
    pointer-events:none;
    z-index: 5;
    box-shadow:
      0 0 0 2px #FFE680,
      0 -6px 18px 2px #FFE680,
      0  6px 18px 2px #FFE680,
      0 -12px 36px #FFF8E7,
      0  12px 36px #FFF8E7;
  }
  .chest.shaking .crack { animation: crackPulse 0.2s steps(2) infinite; }
  @keyframes crackPulse {
    0%,100% { opacity: 0.5; }
    50%     { opacity: 1; }
  }

  /* freeze frame */
  .stage.frozen, .stage.frozen * { animation-play-state: paused !important; }
  .chest.frozen {
    filter: brightness(1.5)
            drop-shadow(0 0 25px #FFE680)
            drop-shadow(0 0 50px #FFF8E7) !important;
  }
  .chest.frozen .crack {
    animation: none !important;
    opacity: 1;
    height: 6px;
    box-shadow:
      0 0 0 3px #FFE680,
      0 -14px 44px 4px #FFE680,
      0  14px 44px 4px #FFE680,
      0 -28px 72px #FFF8E7,
      0  28px 72px #FFF8E7;
  }

  /* roulette */
  .roulette {
    position:absolute;
    top: 14%; left: 50%;
    transform: translateX(-50%) scale(0);
    opacity: 0;
    z-index: 6;
    transition: transform 0.25s cubic-bezier(.2,.8,.3,1.4), opacity 0.25s;
    pointer-events: none;
    white-space: nowrap;
  }
  .roulette.show { transform: translateX(-50%) scale(1); opacity: 1; }
  .roulette.hide { opacity: 0; transform: translateX(-50%) scale(0.6); }
  .roulette > span {
    display: inline-block;
    font-family: 'DotGothic16', monospace;
    font-size: 24px;
    font-weight: 900;
    letter-spacing: 3px;
    text-shadow: 3px 3px 0 #4A3424;
    will-change: transform, color;
  }
  .roulette > span.common    { color: #B0A99E; }
  .roulette > span.uncommon  { color: #7CB342; }
  .roulette > span.rare      { color: #4FC3F7; }
  .roulette > span.epic      {
    color: #BA68C8;
    font-size: 28px;
    text-shadow: 3px 3px 0 #4A3424, 0 0 18px #BA68C8, 0 0 32px #BA68C8;
  }
  .roulette > span.legendary {
    color: #FFC857;
    font-size: 34px;
    text-shadow:
      3px 3px 0 #4A3424,
      -2px -2px 0 #4A3424,
      0 0 22px #FFE680,
      0 0 40px #FFE680;
    animation: rouletteLand 0.35s steps(3) 0.4s infinite;
  }
  @keyframes rouletteLand {
    0%,100% { transform: scale(1); }
    50%     { transform: scale(1.25); }
  }

  /* falling petals */
  .petals {
    position:fixed; inset:0;
    pointer-events:none;
    overflow:hidden;
    z-index: 15;
  }
  .petal {
    position:absolute;
    top:-30px;
    width:14px; height:14px;
    will-change: transform;
    animation: petalFall linear forwards;
    image-rendering: pixelated;
    filter: drop-shadow(0 1px 0 rgba(74,52,36,0.2));
  }
  .petal svg { width:100%; height:100%; display:block; }
  @keyframes petalFall {
    0%   { transform: translate(0, -30px) rotate(0deg); }
    50%  { transform: translate(var(--sway,0), 50vh) rotate(180deg); }
    100% { transform: translate(0, calc(100vh + 30px)) rotate(360deg); }
  }

  .chest svg { position:absolute; left:0; top:0; width:100%; height:100%; overflow:visible; }
  .lid-svg { transform-origin: 50% 56%; transition: transform 0.5s cubic-bezier(.5,-0.5,.3,1.5); }
  .chest.open .lid-svg { transform: translateY(-30px) rotate(-14deg); }

  /* exclamation */
  .exclaim {
    position:absolute; top:-44px; left:50%;
    transform: translateX(-50%) scale(0);
    font-size: 44px;
    color: #FFC857;
    text-shadow: 4px 4px 0 #4A3424, -2px -2px 0 #4A3424;
    font-family: 'DotGothic16', monospace;
    font-weight: 900;
    z-index: 5;
  }
  .exclaim.show { animation: exclaimPop 0.6s steps(3) forwards; }
  @keyframes exclaimPop {
    0%   { transform: translateX(-50%) scale(0) translateY(20px); }
    40%  { transform: translateX(-50%) scale(1.4) translateY(-10px); }
    60%  { transform: translateX(-50%) scale(1) translateY(0); }
    100% { transform: translateX(-50%) scale(1) translateY(0); }
  }
  .exclaim.hide { opacity: 0; }

  /* flash */
  .flash {
    position:fixed; inset:0;
    background: #FFF8E7;
    opacity: 0;
    pointer-events:none;
    z-index: 50;
  }
  .flash.fire { animation: flashBoom 0.5s steps(4) forwards; }
  @keyframes flashBoom {
    0%   { opacity: 0; }
    20%  { opacity: 1; background: #FFF8E7; }
    60%  { opacity: 0.75; background: #FFE680; }
    100% { opacity: 0; }
  }

  /* rings */
  .ring {
    position:absolute; top:50%; left:50%;
    width: 20px; height: 20px;
    border: 6px solid #FFE680;
    border-radius: 0;
    transform: translate(-50%,-50%) scale(0);
    opacity: 0;
    pointer-events:none;
    box-shadow: 0 0 0 2px #4A3424;
  }
  .ring.fire  { animation: ringOut 1s steps(8) forwards; }
  .ring.r2    { animation-delay: 0.1s; border-color: #FFF8E7; }
  .ring.r3    { animation-delay: 0.2s; border-color: #FF8FA3; }
  @keyframes ringOut {
    0%   { transform: translate(-50%,-50%) scale(0);  opacity: 1; }
    100% { transform: translate(-50%,-50%) scale(40); opacity: 0; }
  }

  /* result */
  .result {
    position:absolute;
    top:50%; left:50%;
    transform: translate(-50%,-50%);
    opacity:0;
    pointer-events:none;
    text-align:center;
    z-index: 5;
    width: 90%;
  }
  .result.show { opacity: 1; pointer-events:auto; }

  .rank-wrap {
    position:relative;
    margin-bottom: 22px;
    transform: scale(0);
  }
  .result.show .rank-wrap { animation: stamp 0.6s steps(4) forwards; }
  @keyframes stamp {
    0%   { transform: scale(0) rotate(-20deg); }
    60%  { transform: scale(1.4) rotate(4deg); }
    80%  { transform: scale(0.9) rotate(-2deg); }
    100% { transform: scale(1) rotate(0); }
  }

  .rank-label {
    font-size: 12px;
    letter-spacing: 4px;
    color: #4A3424;
    margin-bottom: 10px;
    text-shadow: 2px 2px 0 #FFF8E7;
    font-family: 'Press Start 2P', monospace;
  }
  .rank-name {
    font-size: 44px;
    color: #FFC857;
    text-shadow:
      3px 3px 0 #4A3424,
      -2px -2px 0 #4A3424,
      0 0 22px #FFE680;
    letter-spacing: 6px;
    animation: rankGlow 0.5s steps(2) infinite;
    font-family: 'DotGothic16', monospace;
    font-weight: 900;
  }
  @keyframes rankGlow {
    0%,100% { color: #FFC857; text-shadow: 3px 3px 0 #4A3424, -2px -2px 0 #4A3424, 0 0 22px #FFE680; }
    50%     { color: #FFF8E7; text-shadow: 3px 3px 0 #4A3424, -2px -2px 0 #4A3424, 0 0 32px #FFF8E7; }
  }

  .qr-card {
    display: inline-block;
    background: #FFF8E7;
    padding: 16px;
    border: 6px solid #FFE680;
    box-shadow:
      0 0 0 3px #4A3424,
      0 0 0 9px #FFE680,
      0 0 0 12px #4A3424,
      8px 14px 0 12px rgba(74, 52, 36, 0.28),
      0 0 40px rgba(255, 200, 87, 0.8);
    transform: translateY(30px);
    opacity: 0;
  }
  .result.show .qr-card { animation: cardIn 0.4s steps(3) 0.5s forwards; }
  @keyframes cardIn {
    0%   { transform: translateY(30px) scale(0.8); opacity: 0; }
    60%  { transform: translateY(-6px) scale(1.05); opacity: 1; }
    100% { transform: translateY(0) scale(1); opacity: 1; }
  }
  .qr-card img {
    display: block;
    width: 230px; height: 230px;
    max-width: 62vw; max-height: 62vw;
    image-rendering: pixelated;
  }

  /* button */
  .btn-wrap {
    margin-top: 26px;
    opacity: 0;
    transform: translateY(20px);
  }
  .result.show .btn-wrap { animation: btnIn 0.4s steps(3) 0.9s forwards; }
  @keyframes btnIn {
    0%   { opacity: 0; transform: translateY(20px); }
    100% { opacity: 1; transform: translateY(0); }
  }
  .click-btn {
    display: inline-block;
    padding: 14px 28px;
    background: #FFE680;
    color: #4A3424;
    font-family: 'DotGothic16', monospace;
    font-size: 18px;
    font-weight: 900;
    letter-spacing: 3px;
    text-decoration: none;
    border: 3px solid #4A3424;
    box-shadow:
      0 0 0 3px #FFE680,
      6px 6px 0 3px #4A3424;
    transition: transform 0.1s steps(2), box-shadow 0.1s steps(2);
  }
  .click-btn:active {
    transform: translate(3px, 3px);
    box-shadow:
      0 0 0 3px #FFE680,
      3px 3px 0 3px #4A3424;
  }

  /* hint */
  .hint {
    position:absolute;
    bottom: 80px; left:50%;
    transform: translateX(-50%);
    color: #4A3424;
    font-size: 15px;
    letter-spacing: 2px;
    text-shadow: 2px 2px 0 #FFF8E7;
    white-space: nowrap;
    animation: blink 0.7s steps(2) infinite;
    font-family: 'DotGothic16', monospace;
    font-weight: 900;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .hint.hide { display: none; }
  .arrow { display:inline-block; animation: arrowMove 0.5s steps(2) infinite; }
  @keyframes arrowMove { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }

  /* pixel particles */
  .particle {
    position:fixed;
    width: 8px; height: 8px;
    background: #FFE680;
    pointer-events:none;
    z-index: 30;
    box-shadow: 0 0 0 2px #4A3424;
  }
  .particle.white { background: #FFF8E7; }
  .particle.pink  { background: #FF8FA3; }

  /* short / small mobile screens */
  @media (max-height: 640px) {
    .villager { width: 44px; height: 56px; }
    .villagers { bottom: 14px; height: 56px; }
  }
  @media (max-height: 560px) {
    .villagers { display: none; }
  }
  @media (max-width: 340px) {
    .chest { width: 220px; height: 186px; }
  }
</style>
</head>
<body>
  <div class="clouds" id="clouds"></div>
  <div class="grass"></div>

  <div class="villagers">
    <!-- Tom Nook (너구리): brown tanuki with cream apron -->
    <div class="villager v-nook">
      <svg viewBox="0 0 16 20" shape-rendering="crispEdges">
        <!-- ears -->
        <rect x="2" y="3" width="2" height="2" fill="#3B2416"/>
        <rect x="12" y="3" width="2" height="2" fill="#3B2416"/>
        <!-- head -->
        <rect x="3" y="4" width="10" height="6" fill="#8B6F47"/>
        <rect x="3" y="5" width="2" height="4" fill="#3B2416"/>
        <rect x="11" y="5" width="2" height="4" fill="#3B2416"/>
        <!-- face mask (cream) -->
        <rect x="5" y="6" width="6" height="3" fill="#F5E6C8"/>
        <!-- eyes -->
        <rect x="5" y="6" width="1" height="1" fill="#1A0E06"/>
        <rect x="10" y="6" width="1" height="1" fill="#1A0E06"/>
        <!-- nose -->
        <rect x="7" y="8" width="2" height="1" fill="#1A0E06"/>
        <!-- body (green apron vest) -->
        <rect x="3" y="10" width="10" height="6" fill="#6FAE4F"/>
        <rect x="3" y="10" width="10" height="1" fill="#4A8A2E"/>
        <!-- apron cream panel -->
        <rect x="5" y="12" width="6" height="3" fill="#F5E6C8"/>
        <rect x="7" y="13" width="2" height="1" fill="#C8373E"/>
        <!-- arms -->
        <rect x="2" y="11" width="1" height="4" fill="#8B6F47"/>
        <rect x="13" y="11" width="1" height="4" fill="#8B6F47"/>
        <!-- legs -->
        <rect x="4" y="16" width="3" height="3" fill="#3B2416"/>
        <rect x="9" y="16" width="3" height="3" fill="#3B2416"/>
      </svg>
    </div>

    <!-- Isabelle (여울이): yellow dog with green leaf hair -->
    <div class="villager v-isabelle">
      <svg viewBox="0 0 16 20" shape-rendering="crispEdges">
        <!-- leaf on head -->
        <rect x="7" y="1" width="2" height="1" fill="#6FAE4F"/>
        <rect x="6" y="2" width="4" height="1" fill="#6FAE4F"/>
        <rect x="7" y="2" width="2" height="1" fill="#8BCB68"/>
        <!-- ears (buns) -->
        <rect x="2" y="3" width="3" height="3" fill="#FFD84A"/>
        <rect x="11" y="3" width="3" height="3" fill="#FFD84A"/>
        <rect x="3" y="4" width="1" height="1" fill="#E8B820"/>
        <rect x="12" y="4" width="1" height="1" fill="#E8B820"/>
        <!-- head -->
        <rect x="4" y="4" width="8" height="6" fill="#FFE680"/>
        <rect x="4" y="4" width="8" height="1" fill="#FFD84A"/>
        <!-- face cream -->
        <rect x="5" y="7" width="6" height="2" fill="#FFF8E7"/>
        <!-- eyes -->
        <rect x="5" y="6" width="1" height="2" fill="#1A0E06"/>
        <rect x="10" y="6" width="1" height="2" fill="#1A0E06"/>
        <rect x="5" y="6" width="1" height="1" fill="#FFF8E7"/>
        <rect x="10" y="6" width="1" height="1" fill="#FFF8E7"/>
        <!-- cheeks -->
        <rect x="4" y="8" width="1" height="1" fill="#FF8FA3"/>
        <rect x="11" y="8" width="1" height="1" fill="#FF8FA3"/>
        <!-- nose -->
        <rect x="7" y="8" width="2" height="1" fill="#1A0E06"/>
        <!-- body (white blouse + red skirt) -->
        <rect x="4" y="10" width="8" height="3" fill="#FFF8E7"/>
        <rect x="4" y="13" width="8" height="3" fill="#C8373E"/>
        <rect x="4" y="13" width="8" height="1" fill="#E85D55"/>
        <!-- collar bow -->
        <rect x="7" y="10" width="2" height="1" fill="#FFC857"/>
        <!-- static arm -->
        <rect x="3" y="11" width="1" height="3" fill="#FFE680"/>
        <!-- waving arm -->
        <rect class="wave-arm" x="12" y="10" width="1" height="4" fill="#FFE680"/>
        <!-- legs -->
        <rect x="5" y="16" width="2" height="3" fill="#FFE680"/>
        <rect x="9" y="16" width="2" height="3" fill="#FFE680"/>
        <rect x="5" y="18" width="2" height="1" fill="#3B2416"/>
        <rect x="9" y="18" width="2" height="1" fill="#3B2416"/>
      </svg>
    </div>

    <!-- Player: peach face with red cap -->
    <div class="villager v-player">
      <svg viewBox="0 0 16 20" shape-rendering="crispEdges">
        <!-- cap -->
        <rect x="3" y="2" width="10" height="2" fill="#C8373E"/>
        <rect x="4" y="1" width="8" height="1" fill="#E85D55"/>
        <rect x="3" y="4" width="10" height="1" fill="#8B2020"/>
        <!-- head -->
        <rect x="4" y="5" width="8" height="5" fill="#FFD6B0"/>
        <!-- hair sides -->
        <rect x="3" y="5" width="1" height="3" fill="#6B3410"/>
        <rect x="12" y="5" width="1" height="3" fill="#6B3410"/>
        <!-- eyes -->
        <rect x="6" y="7" width="1" height="1" fill="#1A0E06"/>
        <rect x="9" y="7" width="1" height="1" fill="#1A0E06"/>
        <!-- cheeks -->
        <rect x="5" y="8" width="1" height="1" fill="#FF8FA3"/>
        <rect x="10" y="8" width="1" height="1" fill="#FF8FA3"/>
        <!-- mouth -->
        <rect x="7" y="9" width="2" height="1" fill="#C8373E"/>
        <!-- body (blue shirt) -->
        <rect x="3" y="10" width="10" height="5" fill="#4A9BD4"/>
        <rect x="3" y="10" width="10" height="1" fill="#2E7BB4"/>
        <rect x="6" y="12" width="4" height="1" fill="#FFF8E7"/>
        <!-- arms -->

    <div class="ring" id="ring1"></div>

    <div class="chest" id="chest">

      <!-- BODY (gift box bottom) -->

      <div class="qr-card">
        <img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAMgAAADIAQMAAACXljzdAAAABlBMVEX///8AAABVwtN+AAAACXBIWXMAAA7EAAAOxAGVKw4bAAABAElEQVRYhd2XwQ7DMAhD4cvz57Bik7SplHs9qu7A22EWYJjZMUYizOo183Am4tsEvz2taCXDg9+QJZWD0qTS0hryBM9VL/sTUp2IosmTuxPz2KNCpJ2inug+3D1Ei6xIWsUjI0lGzppxspxyQ5VQZY2WJdKYL10y2vOAaRJ4Q5QYRPZegu1Np1AlLB3NL/p6uCfsmwT7J8nZbGuyZAmW6fVZxfFnJ8oSlg5pdpwLE47PpdXZiH0jaJIZJbXdwPd1q0WwT7MXUPYy9f0SkiJTJ6wip1LXJdRZ8zWPUVqfOuEfIF8bS56sy83zpVSKsBO7dtC596gYeTgFr7buRlFyjB8VjpjPFFwIlgAAAABJRU5ErkJggg==" alt="QR Code">

  <div class="petals" id="petals"></div>
  <div class="flash" id="flash"></div>

<script>
  // clouds drifting across sky
  const cloudsEl = document.getElementById('clouds');
  const cloudSVG = '<svg width="100%" height="100%" viewBox="0 0 40 16" shape-rendering="crispEdges" preserveAspectRatio="none"><rect x="4" y="9" width="32" height="7" fill="#fff"/><rect x="0" y="5" width="40" height="7" fill="#fff"/><rect x="10" y="0" width="20" height="7" fill="#fff"/></svg>';
  for (let i = 0; i < 6; i++) {
    const c = document.createElement('div');
    c.className = 'cloud';
    c.innerHTML = cloudSVG;
    c.style.top = (5 + Math.random() * 38) + '%';
    c.style.width = (80 + Math.random() * 60) + 'px';
    c.style.height = (28 + Math.random() * 16) + 'px';
    c.style.animationDelay = (-Math.random() * 45) + 's';
    c.style.animationDuration = (40 + Math.random() * 20) + 's';
    cloudsEl.appendChild(c);
  }

  const stage        = document.getElementById('stage');
  const chest        = document.getElementById('chest');
  const circle       = document.getElementById('circle');
  const exclaim      = document.getElementById('exclaim');
  const flash        = document.getElementById('flash');
  const result       = document.getElementById('result');
  const hint         = document.getElementById('hint');
  const roulette     = document.getElementById('roulette');
  const rouletteText = document.getElementById('rouletteText');
  const petalsEl     = document.getElementById('petals');

  // petal rain
  const PETAL_SVGS = [
    '<svg viewBox="0 0 8 8" shape-rendering="crispEdges"><rect x="2" y="1" width="4" height="1" fill="#FFB5C5"/><rect x="1" y="2" width="6" height="4" fill="#FF8FA3"/><rect x="2" y="6" width="4" height="1" fill="#FFB5C5"/><rect x="3" y="3" width="2" height="2" fill="#FFD6DE"/></svg>',
    '<svg viewBox="0 0 8 8" shape-rendering="crispEdges"><rect x="2" y="1" width="4" height="1" fill="#FFF8E7"/><rect x="1" y="2" width="6" height="4" fill="#FFE680"/><rect x="2" y="6" width="4" height="1" fill="#FFF8E7"/><rect x="3" y="3" width="2" height="2" fill="#FFF8E7"/></svg>',
    '<svg viewBox="0 0 8 8" shape-rendering="crispEdges"><rect x="2" y="1" width="4" height="1" fill="#FFF8E7"/><rect x="1" y="2" width="6" height="4" fill="#FFF8E7"/><rect x="2" y="6" width="4" height="1" fill="#FFE680"/><rect x="3" y="3" width="2" height="2" fill="#FFD6DE"/></svg>'
  ];
  let petalInterval = null;
  function spawnPetal() {
    const p = document.createElement('div');
    p.className = 'petal';
    p.innerHTML = PETAL_SVGS[Math.floor(Math.random() * PETAL_SVGS.length)];
    p.style.left = (Math.random() * 100) + 'vw';
    const size = 10 + Math.random() * 10;
    p.style.width = size + 'px';
    p.style.height = size + 'px';
    p.style.animationDuration = (4 + Math.random() * 3) + 's';
    p.style.setProperty('--sway', (Math.random() * 80 - 40) + 'px');
    petalsEl.appendChild(p);
    setTimeout(() => p.remove(), 7500);
  }
  function startPetals() {
    if (petalInterval) return;
    for (let i = 0; i < 10; i++) {
      const p = document.createElement('div');
      p.className = 'petal';
      p.innerHTML = PETAL_SVGS[Math.floor(Math.random() * PETAL_SVGS.length)];
      p.style.left = (Math.random() * 100) + 'vw';
      const size = 10 + Math.random() * 10;
      p.style.width = size + 'px';
      p.style.height = size + 'px';
      const dur = 4 + Math.random() * 3;
      p.style.animationDuration = dur + 's';
      p.style.animationDelay = (-Math.random() * dur) + 's';
      p.style.setProperty('--sway', (Math.random() * 80 - 40) + 'px');
      petalsEl.appendChild(p);
      setTimeout(() => p.remove(), 7500);
    }
    petalInterval = setInterval(spawnPetal, 160);
  }
  function stopPetals() {
    if (petalInterval) { clearInterval(petalInterval); petalInterval = null; }
  }
  const rings        = [document.getElementById('ring1'), document.getElementById('ring2'), document.getElementById('ring3')];

  const RANKS = [
    { name: 'COMMON',   cls: 'common'   },
    { name: 'UNCOMMON', cls: 'uncommon' },
    { name: 'RARE',     cls: 'rare'     },
    { name: 'EPIC',     cls: 'epic'     }
  ];
  let rouletteTimer = null;
  let opened = false;

  function startRoulette(onLand) {
    roulette.classList.add('show');
    let i = 0;
    let fakeAnim = null;
    const startTime = performance.now();
    const fastEnd  = 600;

    function jitter() {
      const jx = (Math.random() - 0.5) * 12;
      const jy = (Math.random() - 0.5) *  6;
      const js = 0.9 + Math.random() * 0.25;
      rouletteText.style.transform = `translate(${jx}px, ${jy}px) scale(${js})`;
    }

    function fastTick() {
      const elapsed = performance.now() - startTime;
      if (elapsed >= fastEnd) { slowUncommon(); return; }
      const t = elapsed / fastEnd;
      const delay = 22 + t * 55;
      const r = RANKS[i % RANKS.length];
      rouletteText.className = r.cls;
      rouletteText.textContent = r.name;
      jitter();
      i++;
      rouletteTimer = setTimeout(fastTick, delay);
    }

    function slowUncommon() {
      rouletteText.className = 'uncommon';
      rouletteText.textContent = 'UNCOMMON';
      jitter();
      rouletteTimer = setTimeout(slowRare, 170);
    }
    function slowRare() {
      rouletteText.className = 'rare';
      rouletteText.textContent = 'RARE';
      jitter();
      rouletteTimer = setTimeout(fakeStop, 230);
    }
    function fakeStop() {
      rouletteText.className = 'epic';
      rouletteText.textContent = 'EPIC';
      rouletteText.style.transform = '';
      fakeAnim = rouletteText.animate([
        { transform: 'scale(0.7)' },
        { transform: 'scale(1.18)' }
      ], { duration: 220, easing: 'cubic-bezier(.2,.8,.3,1.2)', fill: 'forwards' });
      if (navigator.vibrate) navigator.vibrate(90);
      rouletteTimer = setTimeout(clickUp, 550);
    }
    function clickUp() {
      if (fakeAnim) fakeAnim.cancel();
      rouletteText.className = 'legendary';
      rouletteText.textContent = 'LEGENDARY';
      rouletteText.style.transform = '';
      rouletteText.animate([
        { transform: 'scale(0.3)' },
        { transform: 'scale(1.7)', offset: 0.5 },
        { transform: 'scale(1)'   }
      ], { duration: 400, easing: 'cubic-bezier(.2,.8,.3,1)' });
      spawnSparks(16);
      if (navigator.vibrate) navigator.vibrate([40, 40, 160]);
      if (onLand) onLand();
    }

    fastTick();
  }

  chest.addEventListener('click', () => {
    if (opened) return;
    opened = true;
    hint.classList.add('hide');
    chest.style.animation = 'none';

    chest.classList.add('charging');
    exclaim.classList.add('show');
    startPetals();
    if (navigator.vibrate) navigator.vibrate([30, 20, 30, 20, 30]);

    setTimeout(() => {
      chest.classList.remove('charging');
      chest.classList.add('shaking');
      stage.classList.add('shaking');
      circle.classList.add('active');
      startRoulette();
      spawnSparks(10);
      if (navigator.vibrate) navigator.vibrate([60, 40, 60, 40, 80, 40, 120]);
    }, 600);

    setTimeout(() => spawnSparks(15), 1100);
    setTimeout(() => spawnSparks(18), 1500);
    setTimeout(() => spawnSparks(22), 1900);

    setTimeout(() => {
      chest.classList.remove('shaking');
      stage.classList.remove('shaking');
      stage.classList.add('frozen');
      chest.classList.add('frozen');
    }, 2450);

    setTimeout(() => {
      stage.classList.remove('frozen');
      chest.classList.remove('frozen');
      stage.classList.add('bigShake');
      exclaim.classList.add('hide');
      roulette.classList.remove('show');
      roulette.classList.add('hide');
      flash.classList.add('fire');
      chest.classList.add('open');
      rings.forEach(r => r.classList.add('fire'));
      spawnParticles(70);
      if (navigator.vibrate) navigator.vibrate(500);
    }, 2750);

    setTimeout(() => {
      chest.classList.add('hide');
      result.classList.add('show');
      stage.classList.remove('bigShake');
      stopPetals();
    }, 3250);
  });

  function spawnSparks(n) {
    const rect = chest.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top  + rect.height / 2;
    for (let i = 0; i < n; i++) {
      const p = document.createElement('div');
      const roll = Math.random();
      p.className = 'particle' + (roll < 0.3 ? ' white' : roll < 0.5 ? ' pink' : '');
      p.style.left = cx + 'px';
      p.style.top  = cy + 'px';
      document.body.appendChild(p);
      const angle = Math.random() * Math.PI * 2;
      const dist  = 60 + Math.random() * 80;
      const dx = Math.cos(angle) * dist;
      const dy = Math.sin(angle) * dist - 30;
      p.animate([
        { transform: 'translate(0,0)', opacity: 1 },
        { transform: `translate(${dx}px, ${dy}px)`, opacity: 0 }
      ], { duration: 700, easing: 'steps(6)' });
      setTimeout(() => p.remove(), 700);
    }
  }

  function spawnParticles(n) {
    const rect = chest.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top  + rect.height / 2;
    for (let i = 0; i < n; i++) {
      const p = document.createElement('div');
      const roll = Math.random();
      p.className = 'particle' + (roll < 0.3 ? ' white' : roll < 0.5 ? ' pink' : '');
      const size = 6 + Math.floor(Math.random() * 6);
      p.style.width  = size + 'px';
      p.style.height = size + 'px';
      p.style.left = cx + 'px';
      p.style.top  = cy + 'px';
      document.body.appendChild(p);
      const angle = Math.random() * Math.PI * 2;
      const dist  = 150 + Math.random() * 300;
      const dx = Math.cos(angle) * dist;
      const dy = Math.sin(angle) * dist - 120;
      p.animate([
        { transform: 'translate(0,0) rotate(0deg)', opacity: 1 },
        { transform: `translate(${dx}px, ${dy}px) rotate(${Math.random()*360}deg)`, opacity: 0 }
      ], { duration: 1400, easing: 'steps(10)' });
      setTimeout(() => p.remove(), 1400);
    }
  }
</script>
